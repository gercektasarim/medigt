name: medigt

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-medigt}
      POSTGRES_USER: ${POSTGRES_USER:-medigt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medigt}
    ports:
      - "${POSTGRES_PORT:-5450}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-medigt} -d ${POSTGRES_DB:-medigt}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-medigtminio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-medigtminio}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio:/data

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pgdata:
  redisdata:
  minio:
