name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: medigt
          POSTGRES_PASSWORD: medigt
          POSTGRES_DB: medigt
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U medigt -d medigt"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://medigt:medigt@localhost:5432/medigt?sslmode=disable
      JWT_SECRET: ci-test-secret-do-not-use-in-prod
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache-dependency-path: server/go.sum
      - working-directory: server
        run: |
          go mod download
          go run ./cmd/migrate up
          go vet ./...
          go test ./...
          go build ./cmd/server
          go build ./cmd/migrate
          go build ./cmd/medigt
